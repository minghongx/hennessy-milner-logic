image: haskell:9.6.7

variables:
  STACK_ROOT: "${CI_PROJECT_DIR}/.stack"


cache: &global_cache
  paths:
    - .stack
    - .stack-work

before_script:
  - stack config set system-ghc --global true

build:
  stage: build
  tags: ["GitlabResearch"]
  script:
    - rm -rf .stack-work/install/*/*/*/bin
    - stack build --no-terminal --coverage --test --bench --no-run-tests --no-run-benchmarks
  after_script:
    - rm -rf ./bin
    - mv .stack-work/install/*/*/*/bin ./bin
  artifacts:
    paths:
      - "bin/"

test:
  stage: test
  tags: ["GitlabResearch"]
  script:
    - rm -rf .stack-work/install/*/*/*/hpc
    - stack --no-terminal test --coverage
  coverage: '/(\d+)% top-level declarations used/'
  after_script:
    - rm -rf ./hpc
    - mv .stack-work/install/*/*/*/hpc ./hpc
  artifacts:
    when: always
    paths:
      - "hpc/"
  cache:
    <<: *global_cache
    policy: pull

hlint:
  image: debian:stable
  tags: ["GitlabResearch"]
  before_script:
    - apt-get update -yqq
    - apt-get install -y curl
  stage: build
  script:
    - curl -sL https://raw.github.com/ndmitchell/hlint/master/misc/travis.sh | sh -s .
  cache:
    policy: pull
